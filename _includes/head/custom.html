<style>
/* ===== Widen site but KEEP centered (no left-floating) ===== */
:root{
  --site-max: 1400px;      /* try 1600px if you want wider */
  --sidebar-w: 18rem;      /* sidebar width on desktop */
}

/* keep wrapper centered */
.masthead__inner-wrap,
.page__inner-wrap,
.initial-content,
.page__footer footer{
  max-width: var(--site-max) !important;
  margin-left: auto !important;
  margin-right: auto !important;
  padding-left: 20px;
  padding-right: 20px;
}

/* widen the main content area next to the author sidebar */
@media (min-width: 64em){
  /* Minimal Mistakes layout uses sidebar + archive */
  .sidebar{
    width: var(--sidebar-w) !important;
  }
  .archive{
    max-width: none !important;
    width: calc(100% - var(--sidebar-w)) !important;
  }
  .page__content{
    max-width: none !important;
  }
}
</style>
